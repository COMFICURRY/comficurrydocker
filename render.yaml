# ComfiCurry prototype — everything on Render (free, no credit card).
# One Blueprint stands up: Postgres + API + customer app + admin app.
#
# Use it: Render Dashboard -> New -> Blueprint -> point at the repo holding
# this file -> Apply. Service URLs are deterministic from the names below, so
# the frontends' API URL and the API's CORS list are pre-wired.
#
# NOTE: *.onrender.com subdomains are globally unique. If any name below is
# taken, Render appends a suffix — then update REACT_APP_API_URL (frontends)
# and CORS_ALLOWED_ORIGINS (api) to the real URLs and redeploy.
#
# Prototype settings: guest login on, order cut-off off, API open. Render free
# web services sleep after ~15 min idle (first hit ~50s); free Postgres expires
# after 90 days. Uploaded slips live on the API's ephemeral disk (lost on
# redeploy) — fine for a short demo.

databases:
  - name: comficurry-proto-db
    plan: free
    region: singapore

services:
  # ---- API (Spring Boot, Docker) ----
  - type: web
    name: comficurry-proto-api
    runtime: docker
    repo: https://github.com/COMFICURRY/comficurryapi
    branch: master
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: DB_HOST
        fromDatabase: { name: comficurry-proto-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: comficurry-proto-db, property: port }
      - key: DB_NAME
        fromDatabase: { name: comficurry-proto-db, property: database }
      - key: DB_USER
        fromDatabase: { name: comficurry-proto-db, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: comficurry-proto-db, property: password }
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ORDERING_ENFORCE_WINDOW
        value: "false"
      - key: LINE_CHANNEL_TOKEN
        value: prototype-placeholder-token
      - key: LINE_CHANNEL_SECRET
        value: prototype-placeholder-secret
      - key: CORS_ALLOWED_ORIGINS
        value: https://comficurry-proto-customer.onrender.com,https://comficurry-proto-admin.onrender.com

  # ---- Customer app (Parcel static, guest login) ----
  - type: web
    name: comficurry-proto-customer
    runtime: static
    repo: https://github.com/COMFICURRY/comficurryapp
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: REACT_APP_API_URL
        value: https://comficurry-proto-api.onrender.com
      - key: REACT_APP_GUEST
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ---- Admin app (CRA static) ----
  - type: web
    name: comficurry-proto-admin
    runtime: static
    repo: https://github.com/COMFICURRY/comficurryaaminapp
    branch: dev
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://comficurry-proto-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
